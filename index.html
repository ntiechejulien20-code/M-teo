<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Météo — Votre position</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Defines the weather card's shape (rounded corners + diagonal notch)
     as a single smooth SVG path, in fractional (objectBoundingBox) units
     so it scales with the card. Using one path instead of layering
     border-radius + a straight polygon clip-path avoids the rendering
     seam that appeared in the top corners. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <clipPath id="cardNotchClip" clipPathUnits="objectBoundingBox">
      <path d="M0.075,0 L0.925,0 A0.075,0.12 0 0 1 1,0.12 L1,0.52 L0.62,1 L0.075,1 A0.075,0.12 0 0 1 0,0.88 L0,0.12 A0.075,0.12 0 0 1 0.075,0 Z"/>
    </clipPath>

    <!-- Small "bubble" shape used by the hourly-forecast cards: rounded on
         three corners, with a diagonal chamfer cut into the top-right
         corner (matching the reference design), all as one smooth path
         so there's no seam between border-radius and clip-path layers. -->
    <clipPath id="hourNotchClip" clipPathUnits="objectBoundingBox">
      <path d="M0.16,0 L0.63,0 L1,0.22 L1,0.86 A0.16,0.1 0 0 1 0.84,1 L0.16,1 A0.16,0.1 0 0 1 0,0.9 L0,0.1 A0.16,0.1 0 0 1 0.16,0 Z"/>
    </clipPath>
  </defs>
</svg>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn grid-btn" id="menuBtn" aria-label="Ouvrir les paramètres">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </button>

    <div class="search-wrap">
      <div class="search">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher une ville..." autocomplete="off">
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="avatar-wrap">
      <button class="avatar-btn" id="avatarBtn" aria-label="Changer d'avatar">
        <span id="avatarDisplay">🙂</span>
      </button>
      <div class="avatar-picker" id="avatarPicker">
        <p class="avatar-picker-title">Choisis ton avatar</p>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
    </div>
  </header>

  <main class="main-grid">

    <!-- Main weather card -->
    <section class="weather-card" id="weatherCard">
      <div class="card-shape" aria-hidden="true"></div>
      <div class="storm-bolts" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="bolt bolt-1"><path fill="currentColor" d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
        <svg viewBox="0 0 24 24" class="bolt bolt-2"><path fill="currentColor" d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
      </div>

      <div class="card-content">
        <div class="card-top">
          <div>
            <h1 class="city-name" id="cityName">—</h1>
            <p class="date" id="dateLabel">—</p>
          </div>
          <button class="refresh-btn" id="refreshBtn" aria-label="Actualiser">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.08A6 6 0 1 1 12 6a5.94 5.94 0 0 1 4.22 1.78L13 11h7V4z"/></svg>
          </button>
        </div>

        <div class="card-mid">
          <div class="temp-block">
            <div class="temp-row">
              <span class="temp-value" id="tempValue">--</span><span class="temp-deg">°</span>
            </div>
            <p class="temp-minmax" id="minMax">Max: -- — Min: --</p>
          </div>
        </div>
      </div>

      <div class="weather-icon" id="mainIcon"></div>
    </section>

    <!-- Pressure / feels-like strip -->
    <section class="stats-strip">
      <div class="stat">
        <span class="stat-icon stat-icon--blue">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2c-4 5-7 8.6-7 12.6A7 7 0 0 0 19 14.6C19 10.6 16 7 12 2z"/></svg>
        </span>
        <div>
          <p class="stat-label">Pression</p>
          <p class="stat-value" id="pressureValue">-- mmHg</p>
        </div>
      </div>
      <div class="stat">
        <span class="stat-icon stat-icon--cyan">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h11.5a2.5 2.5 0 1 0-2.3-3.5"/><path d="M3 12h15a2.5 2.5 0 1 1-2.3 3.5"/><path d="M3 16h9.5a2 2 0 1 1-1.8 2.8"/></svg>
        </span>
        <div>
          <p class="stat-label">Vent</p>
          <p class="stat-value" id="windValue">-- km/h</p>
        </div>
      </div>
      <div class="stat">
        <span class="stat-icon stat-icon--purple">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9 2c-3 3.8-5.2 6.5-5.2 9.4A5.2 5.2 0 0 0 14.2 11.4C14.2 8.5 12 5.8 9 2z"/><path fill="currentColor" opacity="0.6" d="M16.5 9c-2 2.6-3.5 4.4-3.5 6.4a3.5 3.5 0 0 0 7 0C20 13.4 18.5 11.6 16.5 9z"/></svg>
        </span>
        <div>
          <p class="stat-label">Humidité</p>
          <p class="stat-value" id="humidityValue">-- %</p>
        </div>
      </div>
    </section>

    <!-- City tabs (rendered dynamically by JS) -->
    <nav class="city-tabs" id="cityTabs"></nav>

    <!-- Today / Tomorrow toggle -->
    <div class="toggles-row">
      <div class="day-toggle">
        <button class="day-btn active" data-day="today">Aujourd'hui</button>
        <button class="day-btn" data-day="tomorrow">Demain</button>
      </div>
      <div class="res-toggle">
        <button class="res-btn" data-res="30">30 min</button>
        <button class="res-btn active" data-res="60">1 h</button>
      </div>
    </div>

    <!-- Hourly forecast — slow auto-scrolling carousel -->
    <section class="hourly-carousel" id="hourlyCarousel">
      <div class="hourly-track" id="hourlyScroll"></div>
    </section>

    <p class="status-msg" id="statusMsg">Localisation en cours…</p>

  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navHome" aria-label="Accueil">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3l9 8h-2v9h-5v-6H10v6H5v-9H3z"/></svg>
    </button>
    <button class="nav-btn" id="navLocate" aria-label="Recentrer sur ma position">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 14.5 9 2.5 2.5 0 0 1 12 11.5z"/></svg>
    </button>
    <button class="nav-btn" id="navFavorites" aria-label="Villes enregistrées">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 2h12a1 1 0 0 1 1 1v18l-7-4-7 4V3a1 1 0 0 1 1-1z"/></svg>
    </button>
    <button class="nav-btn" id="navSettings" aria-label="Réglages">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 8a4 4 0 1 0 4 4 4 4 0 0 0-4-4zm8.94 4a7.9 7.9 0 0 0-.14-1.5l2.03-1.58-2-3.46-2.39.96a8.08 8.08 0 0 0-2.6-1.5L15.4 2h-4l-.44 2.92a8.08 8.08 0 0 0-2.6 1.5l-2.39-.96-2 3.46L5.6 10.5A7.9 7.9 0 0 0 5.46 12a7.9 7.9 0 0 0 .14 1.5L3.57 15.08l2 3.46 2.39-.96a8.08 8.08 0 0 0 2.6 1.5L11 22h4l.44-2.92a8.08 8.08 0 0 0 2.6-1.5l2.39.96 2-3.46-2.03-1.58c.09-.49.14-.99.14-1.5z"/></svg>
    </button>
  </nav>

  <!-- Settings side panel (opened by the ☰ button or the bottom "Réglages" button) -->
  <div class="overlay" id="settingsOverlay"></div>
  <aside class="side-panel" id="settingsPanel">
    <div class="side-panel-head">
      <h2>Réglages</h2>
      <button class="panel-close" id="closeSettings" aria-label="Fermer">✕</button>
    </div>

    <div class="setting-block">
      <p class="setting-label">Unité de température</p>
      <div class="segmented" id="unitToggle">
        <button class="seg-btn active" data-unit="C">°C</button>
        <button class="seg-btn" data-unit="F">°F</button>
      </div>
    </div>

    <div class="setting-block">
      <p class="setting-label">Thème</p>
      <div class="segmented" id="themeToggle">
        <button class="seg-btn active" data-theme="dark">Sombre</button>
        <button class="seg-btn" data-theme="light">Clair</button>
      </div>
    </div>

    <div class="setting-block">
      <p class="setting-label">Style d'icônes météo</p>
      <div class="segmented" id="iconStyleToggle">
        <button class="seg-btn active" data-icon-style="gloss">3D Glossy</button>
        <button class="seg-btn" data-icon-style="minimal">Minimal</button>
      </div>
    </div>
  </aside>

  <!-- Favorites bottom sheet (opened by the bottom "Favoris" button) -->
  <div class="overlay" id="favoritesOverlay"></div>
  <aside class="sheet" id="favoritesSheet">
    <div class="sheet-head">
      <h2>Villes enregistrées</h2>
      <button class="panel-close" id="closeFavorites" aria-label="Fermer">✕</button>
    </div>
    <div class="favorites-list" id="favoritesList"></div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
